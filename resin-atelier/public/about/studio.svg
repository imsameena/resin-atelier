<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9E2E7"/>
      <stop offset="50%" stop-color="#FBF6E9"/>
      <stop offset="100%" stop-color="#ECE4F8"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="120" cy="100" r="130" fill="#EAAABB" opacity="0.2" filter="url(#soft)"/>
  <circle cx="700" cy="500" r="150" fill="#C3ACE3" opacity="0.2" filter="url(#soft)"/>

  <!-- worktable -->
  <rect x="0" y="440" width="800" height="160" fill="#E8D3B4" opacity="0.35"/>

  <!-- resin pour puddle -->
  <ellipse cx="230" cy="440" rx="150" ry="60" fill="#FFFFFF" opacity="0.6"/>
  <ellipse cx="230" cy="440" rx="100" ry="38" fill="#F9E2E7" opacity="0.8"/>
  <ellipse cx="190" cy="420" rx="40" ry="16" fill="#FFFFFF" opacity="0.6"/>

  <!-- pouring cup -->
  <g transform="translate(340,300) rotate(18)">
    <path d="M-30 0 L30 0 L20 90 L-20 90 Z" fill="#DBCBF0" opacity="0.75"/>
    <ellipse cx="0" cy="0" rx="30" ry="10" fill="#8C67B8" opacity="0.8"/>
  </g>

  <!-- glitter jars -->
  <g transform="translate(500,380)">
    <rect x="-36" y="-90" width="72" height="120" rx="12" fill="#FFFFFF" opacity="0.75"/>
    <rect x="-36" y="-25" width="72" height="55" rx="8" fill="#DBB758" opacity="0.6"/>
    <rect x="-24" y="-112" width="48" height="24" rx="6" fill="#C9A03D"/>
  </g>
  <g transform="translate(590,400)">
    <rect x="-30" y="-76" width="60" height="100" rx="10" fill="#FFFFFF" opacity="0.75"/>
    <rect x="-30" y="-20" width="60" height="44" rx="6" fill="#C96585" opacity="0.5"/>
    <rect x="-20" y="-96" width="40" height="20" rx="5" fill="#C9A03D"/>
  </g>

  <!-- dried flowers scattered -->
  <g transform="translate(150,470) rotate(-12) scale(0.6)">
    <ellipse cx="0" cy="-28" rx="14" ry="26" fill="#C96585" opacity="0.7"/>
    <ellipse cx="24" cy="-10" rx="14" ry="26" fill="#C96585" opacity="0.65" transform="rotate(72)"/>
    <ellipse cx="15" cy="22" rx="14" ry="26" fill="#C96585" opacity="0.6" transform="rotate(144)"/>
    <ellipse cx="-15" cy="22" rx="14" ry="26" fill="#C96585" opacity="0.6" transform="rotate(216)"/>
    <ellipse cx="-24" cy="-10" rx="14" ry="26" fill="#C96585" opacity="0.65" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="10" fill="#DBB758"/>
  </g>
  <g transform="translate(660,480) rotate(20) scale(0.55)">
    <ellipse cx="0" cy="-28" rx="14" ry="26" fill="#8C67B8" opacity="0.7"/>
    <ellipse cx="24" cy="-10" rx="14" ry="26" fill="#8C67B8" opacity="0.65" transform="rotate(72)"/>
    <ellipse cx="15" cy="22" rx="14" ry="26" fill="#8C67B8" opacity="0.6" transform="rotate(144)"/>
    <ellipse cx="-15" cy="22" rx="14" ry="26" fill="#8C67B8" opacity="0.6" transform="rotate(216)"/>
    <ellipse cx="-24" cy="-10" rx="14" ry="26" fill="#8C67B8" opacity="0.65" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="10" fill="#DBB758"/>
  </g>

  <!-- finished keychains hanging -->
  <g transform="translate(120,180)">
    <circle r="4" fill="none" stroke="#C9A03D" stroke-width="4"/>
    <line x1="0" y1="4" x2="0" y2="40" stroke="#C9A03D" stroke-width="2"/>
    <circle cy="70" r="34" fill="#FFFFFF" opacity="0.8" stroke="#EAAABB" stroke-width="3"/>
  </g>
  <g transform="translate(220,150)">
    <circle r="4" fill="none" stroke="#C9A03D" stroke-width="4"/>
    <line x1="0" y1="4" x2="0" y2="50" stroke="#C9A03D" stroke-width="2"/>
    <circle cy="86" r="40" fill="#FFFFFF" opacity="0.8" stroke="#C3ACE3" stroke-width="3"/>
  </g>
</svg>
