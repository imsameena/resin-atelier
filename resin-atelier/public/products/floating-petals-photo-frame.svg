<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF6EF"/>
      <stop offset="100%" stop-color="#ECE4F8"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E4B8"/>
      <stop offset="100%" stop-color="#DBB758"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9E2E7"/>
      <stop offset="100%" stop-color="#DBCBF0"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="120" cy="150" r="140" fill="#EAAABB" opacity="0.25" filter="url(#soft)"/>
  <circle cx="680" cy="650" r="150" fill="#C3ACE3" opacity="0.25" filter="url(#soft)"/>

  <rect x="180" y="140" width="440" height="560" rx="18" fill="url(#frame)"/>
  <rect x="220" y="180" width="360" height="480" rx="8" fill="url(#photo)"/>
  <ellipse cx="330" cy="330" rx="90" ry="50" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="420" cy="480" r="70" fill="#FFFFFF" opacity="0.18"/>

  <!-- pressed florals along the frame edge -->
  <g opacity="0.9">
    <g transform="translate(200,160) rotate(-20) scale(0.55)">
      <ellipse cx="0" cy="-28" rx="14" ry="26" fill="#C96585"/>
      <ellipse cx="24" cy="-10" rx="14" ry="26" fill="#C96585" transform="rotate(72)"/>
      <ellipse cx="15" cy="22" rx="14" ry="26" fill="#C96585" transform="rotate(144)"/>
      <ellipse cx="-15" cy="22" rx="14" ry="26" fill="#C96585" transform="rotate(216)"/>
      <ellipse cx="-24" cy="-10" rx="14" ry="26" fill="#C96585" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="10" fill="#DBB758"/>
    </g>
    <g transform="translate(600,660) rotate(15) scale(0.6)">
      <ellipse cx="0" cy="-28" rx="14" ry="26" fill="#8C67B8"/>
      <ellipse cx="24" cy="-10" rx="14" ry="26" fill="#8C67B8" transform="rotate(72)"/>
      <ellipse cx="15" cy="22" rx="14" ry="26" fill="#8C67B8" transform="rotate(144)"/>
      <ellipse cx="-15" cy="22" rx="14" ry="26" fill="#8C67B8" transform="rotate(216)"/>
      <ellipse cx="-24" cy="-10" rx="14" ry="26" fill="#8C67B8" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="10" fill="#DBB758"/>
    </g>
    <path d="M600 200 q30 -50 60 -20" stroke="#7BAF8C" stroke-width="5" fill="none" opacity="0.6"/>
    <path d="M210 630 q-25 40 5 65" stroke="#7BAF8C" stroke-width="5" fill="none" opacity="0.6"/>
  </g>

  <ellipse cx="400" cy="740" rx="150" ry="14" fill="#1D1815" opacity="0.05"/>
  <text x="400" y="770" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#4C433D" opacity="0.5">Floating Petals Photo Frame</text>
</svg>
