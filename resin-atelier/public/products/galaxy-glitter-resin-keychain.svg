<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F4FC"/>
      <stop offset="100%" stop-color="#FBF6EF"/>
    </linearGradient>
    <radialGradient id="puck" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3A2E52" stop-opacity="0.92"/>
      <stop offset="55%" stop-color="#5B4884" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8C67B8" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="640" cy="140" r="150" fill="#DBB758" opacity="0.25" filter="url(#soft)"/>
  <circle cx="120" cy="640" r="160" fill="#C3ACE3" opacity="0.3" filter="url(#soft)"/>

  <circle cx="400" cy="150" r="34" fill="none" stroke="#C9A03D" stroke-width="10"/>
  <rect x="388" y="182" width="24" height="46" rx="10" fill="#C9A03D"/>

  <circle cx="400" cy="430" r="220" fill="url(#puck)" stroke="#C3ACE3" stroke-width="3"/>
  <ellipse cx="330" cy="330" rx="90" ry="45" fill="#FFFFFF" opacity="0.18"/>

  <!-- holographic glitter flecks -->
  <g>
    <circle cx="330" cy="380" r="4" fill="#F3E4B8"/>
    <circle cx="360" cy="340" r="3" fill="#EAAABB"/>
    <circle cx="410" cy="370" r="5" fill="#DBCBF0"/>
    <circle cx="450" cy="410" r="3" fill="#F3E4B8"/>
    <circle cx="380" cy="440" r="4" fill="#EAAABB"/>
    <circle cx="320" cy="460" r="3" fill="#DBCBF0"/>
    <circle cx="470" cy="480" r="4" fill="#F3E4B8"/>
    <circle cx="440" cy="530" r="3" fill="#DBCBF0"/>
    <circle cx="350" cy="510" r="5" fill="#EAAABB"/>
    <circle cx="300" cy="410" r="3" fill="#F3E4B8"/>
    <circle cx="420" cy="300" r="3" fill="#DBCBF0"/>
    <circle cx="480" cy="360" r="3" fill="#F3E4B8"/>
    <circle cx="500" cy="440" r="4" fill="#EAAABB"/>
    <circle cx="370" cy="480" r="3" fill="#DBCBF0"/>
    <circle cx="310" cy="500" r="4" fill="#F3E4B8"/>
  </g>

  <!-- swirl -->
  <path d="M280 430 Q400 320 520 430 Q400 540 300 470" stroke="#F3E4B8" stroke-width="3" fill="none" opacity="0.5"/>

  <ellipse cx="400" cy="670" rx="150" ry="18" fill="#1D1815" opacity="0.06"/>
  <text x="400" y="760" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#4C433D" opacity="0.55">Galaxy Glitter Keychain</text>
</svg>
